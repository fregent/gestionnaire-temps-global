<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge Multi-Fuseaux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>Gestionnaire Temps Global</h1>
        <button class="theme-toggle" id="themeToggle" title="Basculer le mode sombre">
            <span class="icon">🌙</span>
        </button>
    </div>

    <div class="container">
        
        <!-- Section Horloge -->
        <section class="section" id="clock-section">
            <h2>Horloge Multi-Fuseaux</h2>
            <div class="timezone-grid" id="timezoneGrid"></div>
            <div class="timezone-controls">
                <input type="text" id="cityInput" placeholder="Ajouter une ville (ex: Paris, Tokyo, New York)">
                <button onclick="addTimezone()">Ajouter</button>
            </div>
        </section>

        <!-- Section Chronomètre -->
        <section class="section" id="stopwatch-section">
            <h2>Chronomètre</h2>
            <div class="timer-display" id="stopwatchDisplay">00:00:00</div>
            <div class="controls">
                <button onclick="startStopwatch()" id="startStopBtn">Démarrer</button>
                <button onclick="resetStopwatch()">Réinitialiser</button>
                <button onclick="lapStopwatch()">Tour</button>
            </div>
            <ul id="lapsList"></ul>
        </section>

        <!-- Section Minuteur -->
        <section class="section" id="timer-section">
            <h2>Minuteur</h2>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="timer-input">
                <input type="number" id="timerMinutes" placeholder="Minutes" min="0" max="59">
                <input type="number" id="timerSeconds" placeholder="Secondes" min="0" max="59">
            </div>
            <div class="controls">
                <button onclick="startTimer()" id="timerStartBtn">Démarrer</button>
                <button onclick="resetTimer()">Réinitialiser</button>
            </div>
        </section>
    </div>

    <!-- ====== MODAL ALARME ====== -->
    <div class="alarm-modal" id="alarmModal">
        <div class="alarm-container">
            <div class="alarm-icon" id="alarmIcon">🔔</div>
            <h2 class="alarm-title">ALARME!</h2>
            <p class="alarm-message" id="alarmMessage">Le minuteur est écoulé!</p>
            
            <div class="alarm-time-display" id="alarmTimeDisplay">00:00:00</div>
            
            <div class="alarm-pulse-ring">
                <div class="pulse-ring-1"></div>
                <div class="pulse-ring-2"></div>
                <div class="pulse-ring-3"></div>
            </div>

            <button class="alarm-stop-btn" id="alarmStopBtn" onclick="stopAlarm()">
                <span class="btn-text">ARRÊTER</span>
                <span class="btn-icon">⏹️</span>
            </button>

            <div class="alarm-sound-indicator">
                <span class="sound-wave" id="soundWave1"></span>
                <span class="sound-wave" id="soundWave2"></span>
                <span class="sound-wave" id="soundWave3"></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
